<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Cesium Hello World - OSM Buildings</title>
  <style>
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
  </style>
  <!-- Cesium CSS -->
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.121/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <!-- Cesium JS from CDN -->
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.121/Build/Cesium/Cesium.js"></script>
</head>
<body>
  <div id="cesiumContainer"></div>

  <script>
    // 替换成你自己的 Cesium ion token（免费注册获取）
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJjMWE2MjYxOS03OGFiLTQ2YTQtYTljYy0xYTZiZTQ3Y2M5OTQiLCJpZCI6MzExODA0LCJpYXQiOjE3Njk3NDI4NzV9.bExrsH6Sqxff3AQp66VVBgraRKgi0pnNi6hgbkF30zQ';

    // 初始化 Viewer
    const viewer = new Cesium.Viewer('cesiumContainer', {
      terrain: Cesium.Terrain.fromWorldTerrain(),  // 加载世界地形
    });

    // 飞到旧金山
    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(-122.4175, 37.655, 400),
      orientation: {
        heading: Cesium.Math.toRadians(0.0),
        pitch: Cesium.Math.toRadians(-15.0),
      }
    });

    // 添加 OSM 建筑（异步加载）
    Cesium.createOsmBuildingsAsync().then(buildingTileset => {
      viewer.scene.primitives.add(buildingTileset);
    }).catch(error => {
      console.error('加载 OSM Buildings 失败:', error);
    });
  </script>
</body>
</html>
